<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Generador de Contraseñas</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: monospace;
    }

    body{
      min-height:100vh;
      background:#0f0f1b;
      display:flex;
      justify-content:center;
      align-items:center;
      padding:20px;
      color:white;
    }

    .container{
      width:100%;
      max-width:420px;
    }

    .title{
      text-align:center;
      color:#7b7b8f;
      margin-bottom:20px;
      font-size:1.2rem;
    }

    .password-box{
      background:#1d1d2e;
      padding:20px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:20px;
    }

    #password{
      border:none;
      outline:none;
      background:transparent;
      color:white;
      width:100%;
      font-size:1.5rem;
      font-weight:bold;
    }

    .copy-btn{
      background:none;
      border:none;
      color:#9df6a7;
      font-size:1.3rem;
      cursor:pointer;
      transition:.2s;
    }

    .copy-btn:hover{
      transform:scale(1.1);
    }

    .settings{
      background:#1d1d2e;
      padding:25px;
    }

    .length{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:15px;
    }

    .length span{
      color:#9df6a7;
      font-size:2rem;
      font-weight:bold;
    }

    input[type="range"]{
      width:100%;
      margin-bottom:25px;
      accent-color:#9df6a7;
      cursor:pointer;
    }

    .option{
      display:flex;
      align-items:center;
      gap:15px;
      margin-bottom:18px;
      font-size:1rem;
    }

    .option input{
      width:18px;
      height:18px;
      cursor:pointer;
      accent-color:#9df6a7;
    }

    .strength-box{
      background:#131320;
      padding:20px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-top:25px;
      margin-bottom:25px;
    }

    .strength-title{
      color:#7b7b8f;
      font-weight:bold;
    }

    .strength{
      display:flex;
      align-items:center;
      gap:10px;
    }

    .bars{
      display:flex;
      gap:5px;
    }

    .bar{
      width:10px;
      height:28px;
      border:2px solid white;
    }

    .generate-btn{
      width:100%;
      padding:18px;
      border:none;
      background:#9df6a7;
      color:#131320;
      font-size:1.1rem;
      font-weight:bold;
      cursor:pointer;
      transition:.2s;
    }

    .generate-btn:hover{
      background:white;
    }

    .generate-btn:focus,
    .copy-btn:focus,
    input:focus{
      outline:2px solid #9df6a7;
      outline-offset:4px;
    }

    @media(max-width:500px){
      .settings{
        padding:20px;
      }

      #password{
        font-size:1.1rem;
      }
    }
  </style>
</head>

<body>

  <div class="container">

    <h1 class="title">Password Generator</h1>

    <div class="password-box">
      <input type="text" id="password" readonly placeholder="P4$5W0rD!">
      <button class="copy-btn" id="copyBtn">📋</button>
    </div>

    <div class="settings">

      <div class="length">
        <h2>Character Length</h2>
        <span id="lengthValue">10</span>
      </div>

      <input type="range" min="4" max="30" value="10" id="lengthSlider">

      <label class="option">
        <input type="checkbox" id="uppercase" checked>
        Include Uppercase Letters
      </label>

      <label class="option">
        <input type="checkbox" id="lowercase" checked>
        Include Lowercase Letters
      </label>

      <label class="option">
        <input type="checkbox" id="numbers" checked>
        Include Numbers
      </label>

      <label class="option">
        <input type="checkbox" id="symbols">
        Include Symbols
      </label>

      <div class="strength-box">

        <div class="strength-title">
          STRENGTH
        </div>

        <div class="strength">
          <span id="strengthText">MEDIUM</span>

          <div class="bars">
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
          </div>
        </div>

      </div>

      <button class="generate-btn" id="generateBtn">
        GENERATE →
      </button>

    </div>

  </div>

  <script>

    const password = document.getElementById("password");
    const copyBtn = document.getElementById("copyBtn");
    const generateBtn = document.getElementById("generateBtn");

    const lengthSlider = document.getElementById("lengthSlider");
    const lengthValue = document.getElementById("lengthValue");

    const uppercase = document.getElementById("uppercase");
    const lowercase = document.getElementById("lowercase");
    const numbers = document.getElementById("numbers");
    const symbols = document.getElementById("symbols");

    const strengthText = document.getElementById("strengthText");
    const bars = document.querySelectorAll(".bar");

    lengthSlider.addEventListener("input", () => {
      lengthValue.textContent = lengthSlider.value;
      updateStrength();
    });

    document.querySelectorAll("input[type='checkbox']").forEach(check => {
      check.addEventListener("change", updateStrength);
    });

    function generatePassword(){

      let chars = "";

      if(uppercase.checked){
        chars += "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
      }

      if(lowercase.checked){
        chars += "abcdefghijklmnopqrstuvwxyz";
      }

      if(numbers.checked){
        chars += "0123456789";
      }

      if(symbols.checked){
        chars += "!@#$%^&*()_+{}[]<>?/|";
      }

      if(chars === ""){
        alert("Selecciona al menos una opción");
        return;
      }

      let result = "";

      for(let i = 0; i < lengthSlider.value; i++){

        let random = Math.floor(Math.random() * chars.length);

        result += chars[random];
      }

      password.value = result;

      updateStrength();
    }

    function updateStrength(){

      let score = 0;

      if(uppercase.checked) score++;
      if(lowercase.checked) score++;
      if(numbers.checked) score++;
      if(symbols.checked) score++;

      if(lengthSlider.value >= 12) score++;
      if(lengthSlider.value >= 18) score++;

      bars.forEach(bar => {
        bar.style.background = "transparent";
      });

      if(score <= 2){
        strengthText.textContent = "WEAK";

        for(let i = 0; i < 1; i++){
          bars[i].style.background = "red";
        }

      }else if(score <= 4){

        strengthText.textContent = "MEDIUM";

        for(let i = 0; i < 2; i++){
          bars[i].style.background = "orange";
        }

      }else if(score <= 5){

        strengthText.textContent = "STRONG";

        for(let i = 0; i < 3; i++){
          bars[i].style.background = "yellow";
        }

      }else{

        strengthText.textContent = "VERY STRONG";

        for(let i = 0; i < 4; i++){
          bars[i].style.background = "#9df6a7";
        }
      }
    }

    copyBtn.addEventListener("click", () => {

      if(password.value === "") return;

      navigator.clipboard.writeText(password.value);

      copyBtn.textContent = "✔";

      setTimeout(() => {
        copyBtn.textContent = "📋";
      }, 1500);

    });

    generateBtn.addEventListener("click", generatePassword);

    generatePassword();

  </script>

</body>
</html>
