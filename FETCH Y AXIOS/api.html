<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rick & Morty API Explorer</title>
<!-- Axios -->
<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#20232a;
    color:white;
    padding:30px;
}

header{
    text-align:center;
    margin-bottom:30px;
}

header h1{
    color:#61dafb;
    font-size:38px;
    margin-bottom:10px;
}

header p{
    color:#ddd;
}

.botones{
    text-align:center;
    margin-bottom:30px;
}

button{
    padding:15px 25px;
    margin:10px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    background:#61dafb;
    color:#20232a;
    font-weight:bold;
    font-size:16px;
    transition:.3s;
}

button:hover{
    transform:scale(1.05);
    background:#21a1f1;
}

#data-container{
    display:grid;
    grid-template-columns:
    repeat(auto-fit,minmax(250px,1fr));
    gap:25px;
}

.card{
    background:#333842;
    border-radius:15px;
    overflow:hidden;
    box-shadow:
    0 5px 15px rgba(0,0,0,.5);
    transition:.3s;
}

.card:hover{
    transform:translateY(-8px);
}

.card img{
    width:100%;
    display:block;
}

.info{
    padding:20px;
}

.info h2{
    color:#61dafb;
    margin-bottom:15px;
}

.info p{
    margin:8px 0;
}

.estado{
    font-weight:bold;
}

.error{
    text-align:center;
    color:#ff6b6b;
    font-size:22px;
}

.cargando{
    text-align:center;
    font-size:22px;
}

</style>

</head>

<body>

<header>

<h1>
🧪 Rick & Morty API Explorer
</h1>

<p>
Comparación entre Fetch y Axios
</p>

</header>

<section class="botones">

<button id="btnFetch">

Obtener con Fetch

</button>

<button id="btnAxios">

Obtener con Axios

</button>

</section>

<main id="data-container">

</main>

<script>

// CONFIGURACIÓN

const API = 
"https://rickandmortyapi.com/api/character";

const contenedor =
document.getElementById(
"data-container"
);

const btnFetch =
document.getElementById(
"btnFetch"
);

const btnAxios =
document.getElementById(
"btnAxios"
);

// FUNCIÓN PARA MOSTRAR DATOS

function mostrarPersonajes(personajes){

    contenedor.innerHTML="";

    personajes.forEach(personaje=>{

        const tarjeta =
        document.createElement("div");
        tarjeta.className="card";
        tarjeta.innerHTML=`
        <img src="${personaje.image}">
        <div class="info">
            <h2>
            ${personaje.name}
            </h2>
            <p class="estado">
            Estado:
            ${personaje.status}
            </p>
            <p>
            Especie:
            ${personaje.species}
            </p>
            <p>
            Género:
            ${personaje.gender}
            </p>
            <p>
            Origen:
            ${personaje.origin.name}
            </p>
        </div>
        `;

        contenedor.appendChild(
            tarjeta
        );
    });

}

// FETCH

async function usarFetch(){

    try{
        contenedor.innerHTML=
        `
        <p class="cargando">
        Cargando con Fetch...
        </p>
        `;

        const respuesta =
        await fetch(API);

        if(!respuesta.ok){
            throw new Error(
            "Error al obtener datos"
            );
        }

        const datos =
        await respuesta.json();

        mostrarPersonajes(
            datos.results
        );
    }

    catch(error){
        mostrarError(error);
    }
}

// AXIOS

async function usarAxios(){

    try{
        contenedor.innerHTML=
        `
        <p class="cargando">
        Cargando con Axios...
        </p>
        `;

        const respuesta =
        await axios.get(API);

        mostrarPersonajes(
            respuesta.data.results
        );
    }

    catch(error){
        mostrarError(error);
    }


}

// ERRORES

function mostrarError(error){
    contenedor.innerHTML=
    `
    <p class="error">
    Error:
    ${error.message}
    </p>
    `;
}

// EVENTOS

btnFetch.addEventListener(
"click",
usarFetch
);

btnAxios.addEventListener(
"click",
usarAxios
);

</script>
</body>
</html>
